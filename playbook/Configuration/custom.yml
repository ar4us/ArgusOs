          ('C:\Users\*\AppData\Local\Packages\Microsoft.WidgetsPlatformRuntime_8wekyb3d8bbwe')
        );
        foreach ($pattern in $dirs) {
          Get-Item $pattern -ErrorAction SilentlyContinue | ForEach-Object {
            Get-ChildItem $_.FullName -Recurse -Force -ErrorAction SilentlyContinue | Sort-Object { $_.FullName.Length } -Descending | ForEach-Object {
              $pending += ('\??\' + $_.FullName); $pending += ''
            };
            $pending += ('\??\' + $_.FullName); $pending += ''
          }
        };
        if ($pending.Count -gt 0) {
          $regPath = 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager';
          $existing = (Get-ItemProperty -Path $regPath -Name 'PendingFileRenameOperations' -ErrorAction SilentlyContinue).PendingFileRenameOperations;
          if ($existing) { $pending = $existing + $pending };
          Set-ItemProperty -Path $regPath -Name 'PendingFileRenameOperations' -Value $pending -Type MultiString -Force
        }
