  - !writeStatus: {status: 'Disabling DMA remapping'}
  - !powerShell:
      wait: true
      weight: 5
      command: >-
        $policyPath = 'HKLM:\SOFTWARE\Microsoft\PolicyManager\default\DmaGuard\DeviceEnumerationPolicy';
        try { if (-not (Test-Path $policyPath)) { New-Item -Path $policyPath -Force | Out-Null }; Set-ItemProperty -Path $policyPath -Name 'value' -Value 2 -Type DWord -Force -ErrorAction SilentlyContinue } catch {};
        try {
          Get-ChildItem 'HKLM:\SYSTEM\CurrentControlSet\Services' -ErrorAction SilentlyContinue | ForEach-Object {
            $paramsPath = $_.PSPath + '\Parameters';
            if (Test-Path $paramsPath) {
              try {
                $val = (Get-ItemProperty -Path $paramsPath -Name 'DmaRemappingCompatible' -ErrorAction SilentlyContinue).DmaRemappingCompatible;
                if ($null -ne $val) { Set-ItemProperty -Path $paramsPath -Name 'DmaRemappingCompatible' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue }
              } catch {}
            }
          }
        } catch {}

  - !writeStatus: {status: 'Disabling desktop-only devices'}
  - !powerShell:
      wait: true
      weight: 5
      command: >-
        $chassisType = 3;
        try { $chassis = (Get-WmiObject -Class Win32_SystemEnclosure -ErrorAction SilentlyContinue).ChassisTypes; if ($chassis -and $chassis.Length -gt 0) { $chassisType = [int]$chassis[0] } } catch {};
        if ($chassisType -gt 7) { exit 0 };
        $devices = @('ACPI Processor Aggregator','ACPI Wake Alarm','AMD Crash Defender','High Precision Event Timer','Intel(R) Platform Monitoring Technology Device');
        foreach ($name in $devices) {
          try {
            $sq = [char]39; $sanitized = $name -replace $sq, ($sq + $sq);
            Get-WmiObject -Class Win32_PnPEntity -Filter ('Name LIKE ' + $sq + '%' + $sanitized + '%' + $sq) -ErrorAction SilentlyContinue | ForEach-Object {
              $did = $_.DeviceID; try { $r = $_.Disable(); if ($r.ReturnValue -ne 0) { pnputil /disable-device $did 2>$null | Out-Null } } catch { pnputil /disable-device $did 2>$null | Out-Null }
            }
          } catch {}
        }

  - !writeStatus: {status: 'Enabling MSI mode'}
  - !powerShell:
      wait: true
      weight: 15
      command: >-
        function Set-MSIForClass { param([string]$WmiClass, [int]$MsiValue); try { Get-WmiObject -Class $WmiClass -ErrorAction SilentlyContinue | Where-Object { $_.PNPDeviceID -like 'PCI\VEN_*' } | ForEach-Object { try { $regPath = 'HKLM:\SYSTEM\CurrentControlSet\Enum\' + $_.PNPDeviceID + '\Device Parameters\Interrupt Management\MessageSignaledInterruptProperties'; if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }; Set-ItemProperty -Path $regPath -Name 'MSISupported' -Value $MsiValue -Type DWord -Force -ErrorAction SilentlyContinue } catch {} } } catch {} };
        Set-MSIForClass 'Win32_IDEController' 1;
        Set-MSIForClass 'Win32_VideoController' 1;
        Set-MSIForClass 'Win32_NetworkAdapter' 1;
        try {
          Get-ChildItem 'HKLM:\SYSTEM\CurrentControlSet\Enum\PCI' -ErrorAction SilentlyContinue | ForEach-Object {
            Get-ChildItem $_.PSPath -ErrorAction SilentlyContinue | ForEach-Object {
              $ap = $_.PSPath + '\Device Parameters\Interrupt Management\Affinity Policy';
              if (Test-Path $ap) { Remove-ItemProperty -Path $ap -Name 'DevicePriority' -ErrorAction SilentlyContinue }
            }
          }
        } catch {}

  - !writeStatus: {status: 'Disabling WINEVT channels'}
  - !powerShell:
      wait: true
      weight: 10
      command: >-
        try {
          $root = [Microsoft.Win32.Registry]::LocalMachine.OpenSubKey('SOFTWARE\Microsoft\Windows\CurrentVersion\WINEVT\Channels', $true);
          if ($root) {
            foreach ($name in $root.GetSubKeyNames()) {
              $sub = $null;
              try {
                $sub = $root.OpenSubKey($name, $true);
                if ($sub -and ($sub.GetValue('Enabled') -eq 1)) { $sub.SetValue('Enabled', 0, 'DWord') }
              } catch {} finally { if ($sub) { $sub.Close() } }
            }
            $root.Close()
          }
        } catch {}

