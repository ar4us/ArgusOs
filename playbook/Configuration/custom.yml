  - !writeStatus: {status: 'Creating Windows default services backup'}
  - !powerShell:
      wait: true
      weight: 5
      command: >-
        $OutputPath = 'C:\Windows\service-backups\windows-default-services.reg';
        $dir = Split-Path $OutputPath -Parent;
        if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force | Out-Null };
        if (Test-Path $OutputPath) {
          try { (Get-Item $OutputPath -Force).Attributes = 'ReadOnly,Hidden'; } catch {};
          return
        };
        $sb = [System.Text.StringBuilder]::new(65536);
        $q = [char]34;
        [void]$sb.AppendLine('Windows Registry Editor Version 5.00');
        Get-ChildItem 'HKLM:\SYSTEM\CurrentControlSet\Services' -ErrorAction SilentlyContinue | ForEach-Object { try { $startVal = (Get-ItemProperty -Path $_.PSPath -Name 'Start' -ErrorAction SilentlyContinue).Start; if ($null -ne $startVal -and $startVal -ge 0 -and $startVal -le 4) { [void]$sb.AppendLine(''); $keyLine = '[HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\' + $_.PSChildName + ']'; [void]$sb.AppendLine($keyLine); $valLine = $q + 'Start' + $q + ('=dword:{0:x8}' -f [int]$startVal); [void]$sb.AppendLine($valLine) } } catch {} };
        [System.IO.File]::WriteAllText($OutputPath, $sb.ToString());
        try { (Get-Item $OutputPath -Force).Attributes = 'ReadOnly,Hidden'; } catch {}

