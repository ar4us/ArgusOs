  - !powerShell:
      runas: currentUserElevated
      command: >-
        $wsh = New-Object -ComObject WScript.Shell;
        $dShortcut = $wsh.CreateShortcut("$env:PUBLIC\Desktop\Argus Toolkit.lnk");
        $dShortcut.TargetPath = "$env:ProgramFiles\Argus Toolkit\Argus-Toolkit.exe";
        $dShortcut.Save();
        $mDir = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\Argus Toolkit";
        if (-not (Test-Path $mDir)) { New-Item -ItemType Directory -Path $mDir -Force | Out-Null };
        $mShortcut = $wsh.CreateShortcut("$mDir\Argus Toolkit.lnk");
        $mShortcut.TargetPath = "$env:ProgramFiles\Argus Toolkit\Argus-Toolkit.exe";
        $mShortcut.Save()

