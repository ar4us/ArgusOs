  - !powerShell:
      runas: currentUserElevated
      command: >-
        $executableFilename = 'DeviceCensus.exe';
        $registryPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\DisallowRun';

        if (-not (Test-Path $registryPath)) { New-Item -Path $registryPath -Force | Out-Null };

        $entries = Get-ItemProperty -Path $registryPath -ErrorAction SilentlyContinue;
        if ($entries -and ($entries.PSObject.Properties | Where-Object { $_.Value -eq $executableFilename })) {
            Write-Output ('Skipping: ' + $executableFilename + ' is already blocked.');
            exit 0
        };

        $index = 1;
        if ($entries) {
            $usedIndexes = $entries.PSObject.Properties | Where-Object { $_.Name -match '^\d+$' } | Select-Object -ExpandProperty Name;
            while ($usedIndexes -contains $index) { $index++ };
        };

        New-ItemProperty -Path $registryPath -Name $index -Value $executableFilename -PropertyType String -Force | Out-Null;

