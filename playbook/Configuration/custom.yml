        $dirs = @(
          ($env:ProgramFiles + '\WindowsApps\Microsoft.HEVCVideoExtension*'),
          ($env:ProgramFiles + '\WindowsApps\Microsoft.MicrosoftSolitaireCollection*'),
          ($env:ProgramFiles + '\WindowsApps\Microsoft.WindowsTerminal*'),
