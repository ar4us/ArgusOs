<?xml version="1.0" encoding="utf-8"?>
<Playbook>
	<Name>ArgusOS</Name>
	<Username>ArgusOS</Username>
	<Title>ArgusOS Playbook v1.0</Title>
	<ShortDescription>ArgusOS Playbook v1.0</ShortDescription>
	<Description>ArgusOS is a customized playbook that focuses on improving gaming performance, privacy, and system responsiveness.</Description>
	<Details>ArgusOS is a customized playbook that focuses on improving gaming performance, privacy, and system responsiveness.</Details>
	<ProgressText>ArgusOS Playbook is being applied. Since this playbook aims for a wide range of Windows versions, some errors may occur. If the installation does not reboot automatically, reboot your computer after everything is done.</ProgressText>
	<Version>1.0</Version>
	<SupportedBuilds>
		<string>17763</string>
		<string>18362</string>
		<string>18363</string>
		<string>19041</string>
		<string>19042</string>
		<string>19043</string>
		<string>19044</string>
		<string>19045</string>
		<string>22000</string>
		<string>22621</string>
		<string>22631</string>
		<string>26100</string>
		<string>26200</string>
		<string>28000</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
	</Requirements>
	<Overhaul>false</Overhaul>
	<UseKernelDriver>false</UseKernelDriver>
	<Website>https://github.com/ar4us/ArgusOs</Website>
	<FeaturePages>
		<RadioPage DefaultOption="disable-defender" Description="Disabling Defender improves performance. Can be re-enabled via Argus Toolkit.">
			<Options>
				<RadioOption>
					<Text>Disable Defender (Default)</Text>
					<Name>disable-defender</Name>
				</RadioOption>
				<RadioOption>
					<Text>Keep Defender</Text>
					<Name>enable-defender</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<RadioPage DefaultOption="remove-edge" Description="Choose what to do with Microsoft Edge">
			<Options>
				<RadioOption>
					<Text>Remove Microsoft Edge (Recommended)</Text>
					<Name>remove-edge</Name>
					<Description>Permanently removes Edge browser and EdgeUpdate. Cannot be reverted without reinstalling Windows.</Description>
				</RadioOption>
				<RadioOption>
					<Text>Keep Microsoft Edge</Text>
					<Name>keep-edge</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<RadioPage DefaultOption="disable-printing" Description="Choose what to do with Windows printing services">
			<Options>
				<RadioOption>
					<Text>Disable Printing (Default)</Text>
					<Name>disable-printing</Name>
					<Description>Disables Print Spooler, related services, scheduled tasks, and printing Windows features. Can be re-enabled any time via Argus Toolkit.</Description>
				</RadioOption>
				<RadioOption>
					<Text>Keep Printing</Text>
					<Name>keep-printing</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<CheckboxPage IsRequired="true" Description="Choose which ArgusOS optimizations to apply:">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Cleanup Taskbar and Start Menu</Text>
					<Name>cleanup-taskbar</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove Microsoft OneDrive</Text>
					<Name>remove-onedrive</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove Microsoft Teams</Text>
					<Name>remove-teams</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove WSL (Windows Subsystem for Linux)</Text>
					<Name>remove-wsl</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<CheckboxPage IsRequired="true" Description="Optional app removals:">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Remove Photos App</Text>
					<Name>remove-photos</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="false">
					<Text>Remove Xbox Apps</Text>
					<Name>remove-xbox</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove AI Features (Copilot, Recall)</Text>
					<Name>remove-ai</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
	</FeaturePages>
</Playbook>
